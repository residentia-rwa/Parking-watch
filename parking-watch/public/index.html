<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Parking Watch — Orchid Park</title>
  <meta name="description" content="Slot directory and one-tap parking violation reporting for Orchid Park" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1C1B19" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="toast" class="toast" hidden></div>

  <header class="header">
    <div class="stripe"></div>
    <div class="header-inner">
      <div class="brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#D97B29" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14M6 17l1.2-6.2A2 2 0 0 1 9.16 9h5.68a2 2 0 0 1 1.96 1.8L18 17M7 17v2M17 17v2M8 13h8"/></svg>
        <span class="brand-name">Parking Watch</span>
      </div>
      <div class="brand-sub">Orchid Park · slot directory &amp; reporting</div>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="report">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Report</span>
    </button>
    <button class="tab" data-tab="directory">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      <span>Directory</span>
    </button>
    <button class="tab" data-tab="log">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6M9 16h6M9 8h6M5 21h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2Z"/></svg>
      <span>Log</span>
    </button>
  </nav>

  <main class="content" id="content"></main>

  <script src="/app.js"></script>
</body>
</html>
